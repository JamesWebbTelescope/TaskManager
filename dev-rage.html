<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dev Rage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; }

  body {
    background:#0d0d0d;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
  }

  h1 {
    color:#ff4444; font-size:11px; margin-bottom:20px;
    letter-spacing:2px; text-shadow:0 0 10px #ff4444aa;
    animation:flicker 2.5s infinite;
  }
  @keyframes flicker {
    0%,94%,100%{opacity:1} 95%{opacity:0.3} 97%{opacity:0.7} 98%{opacity:0.1} 99%{opacity:1}
  }

  .scene-wrap { animation:scene-shake 6s steps(1) infinite; }
  @keyframes scene-shake {
    0%,37%{transform:translate(0,0)}
    38%{transform:translate(-3px,2px)} 38.4%{transform:translate(3px,-2px)} 39%{transform:translate(0,0)}
    45.9%{transform:translate(0,0)}
    46%{transform:translate(-4px,3px)} 46.4%{transform:translate(4px,-2px)} 47%{transform:translate(0,0)}
    53.9%{transform:translate(0,0)}
    54%{transform:translate(-5px,4px)} 54.3%{transform:translate(5px,-3px)} 54.6%{transform:translate(-2px,2px)} 55%{transform:translate(0,0)}
    100%{transform:translate(0,0)}
  }

  .scene {
    position:relative; width:420px; height:290px;
    background:#111; border:3px solid #2a2a2a;
    overflow:hidden;
    box-shadow:0 0 50px #ff220022, inset 0 0 40px #00000099;
  }

  .bg { position:absolute; inset:0; background:linear-gradient(180deg,#080810 0%,#0e0e20 55%,#161628 100%); }

  .wall-note {
    position:absolute; top:18px; left:18px;
    width:44px; height:34px; border:2px solid #1e1e1e;
    background:#0a0a14; padding:3px;
    font-size:4px; line-height:1.6; font-family:monospace;
  }
  .wall-led {
    position:absolute; top:12px; right:18px;
    width:7px; height:7px; background:#ff3333; border-radius:50%;
    box-shadow:0 0 6px #ff3333; animation:led-blink 0.7s steps(1) infinite;
  }
  @keyframes led-blink { 0%,49%{opacity:1} 50%,100%{opacity:0.2} }

  .room  { position:absolute; bottom:0; left:0; right:0; height:95px; background:#13131f; border-top:3px solid #1e1e30; }
  .floor { position:absolute; bottom:0; left:0; right:0; height:20px; background:#221508; border-top:3px solid #332210; }

  .desk {
    position:absolute; bottom:20px; left:55px;
    width:300px; height:22px;
    background:#5c3d1e; border-top:4px solid #7a5028; border-radius:2px; z-index:5;
  }
  .desk::before,.desk::after {
    content:''; position:absolute; bottom:-30px; width:13px; height:30px; background:#5c3d1e;
  }
  .desk::before{left:12px} .desk::after{right:12px}

  .desk-crack {
    position:absolute; bottom:20px; left:155px;
    width:30px; height:22px; opacity:0; z-index:6;
    animation:crack-appear 6s steps(1) infinite;
  }
  @keyframes crack-appear { 0%,38%{opacity:0} 39%,100%{opacity:1} }
  .desk-crack svg { width:100%; height:100%; }

  /* CHAIR */
  .chair {
    position:absolute; bottom:20px; left:250px;
    width:60px; height:65px; z-index:3;
    animation:chair-slide 6s steps(1) infinite;
  }
  @keyframes chair-slide { 0%,41%{left:250px} 43%,100%{left:280px} }
  .chair-back  { position:absolute; bottom:12px; left:5px; width:50px; height:40px; background:#252525; border-radius:3px 3px 0 0; border:2px solid #3a3a3a; }
  .chair-seat  { position:absolute; bottom:0;   left:5px; width:50px; height:12px; background:#2e2e2e; border-radius:2px; border-top:2px solid #4a4a4a; }
  .chair-leg1,.chair-leg2 { position:absolute; bottom:-12px; width:6px; height:12px; background:#444; }
  .chair-leg1{left:10px} .chair-leg2{right:10px}

  /* ===== MONITOR ===== */
  /* Timeline 6s:
     0–30%   on desk
     30–35%  stand/approach
     35–38%  LIFT 1
     38–40%  SLAM 1
     40–44%  LIFT 2
     44–46%  SLAM 2 (harder)
     46–50%  LIFT 3
     50–54%  SLAM 3 (hardest)
     54–78%  broken on desk
     78–95%  fade out / reset
  */
  .monitor {
    position:absolute; transform-origin:50% 100%; z-index:10;
    animation:mon 6s steps(1) infinite;
  }
  @keyframes mon {
    /* resting on desk */
    0%   { bottom:42px; left:148px; transform:rotate(0deg) scale(1);    opacity:1; }
    29%  { bottom:42px; left:148px; transform:rotate(0deg) scale(1);    opacity:1; }
    /* lift 1 */
    35%  { bottom:95px; left:136px; transform:rotate(-22deg) scale(1);  opacity:1; }
    37%  { bottom:95px; left:136px; transform:rotate(-22deg) scale(1);  opacity:1; }
    /* SLAM 1 */
    38%  { bottom:36px; left:130px; transform:rotate(-5deg) scaleX(1.06) scaleY(0.9); opacity:1; }
    39%  { bottom:40px; left:132px; transform:rotate(-8deg) scale(1);   opacity:1; }
    /* lift 2 */
    43%  { bottom:90px; left:128px; transform:rotate(-26deg) scale(1);  opacity:1; }
    44%  { bottom:90px; left:128px; transform:rotate(-26deg) scale(1);  opacity:1; }
    /* SLAM 2 */
    46%  { bottom:34px; left:122px; transform:rotate(-10deg) scaleX(1.09) scaleY(0.85); opacity:1; }
    47%  { bottom:40px; left:124px; transform:rotate(-12deg) scale(0.97); opacity:1; }
    /* lift 3 */
    50%  { bottom:88px; left:120px; transform:rotate(-32deg) scale(1);  opacity:1; }
    52%  { bottom:88px; left:120px; transform:rotate(-32deg) scale(1);  opacity:1; }
    /* SLAM 3 */
    54%  { bottom:32px; left:114px; transform:rotate(-18deg) scaleX(1.12) scaleY(0.78); opacity:1; }
    55%  { bottom:36px; left:116px; transform:rotate(-20deg) scaleX(0.9) scaleY(0.88); opacity:1; }
    /* broken */
    58%  { bottom:38px; left:114px; transform:rotate(-22deg) scale(0.88); opacity:1; }
    76%  { bottom:38px; left:114px; transform:rotate(-22deg) scale(0.88); opacity:1; }
    /* fade & reset */
    84%  { bottom:42px; left:148px; transform:rotate(0deg) scale(1); opacity:0; }
    91%  { bottom:42px; left:148px; transform:rotate(0deg) scale(1); opacity:0; }
    96%  { bottom:42px; left:148px; transform:rotate(0deg) scale(1); opacity:1; }
    100% { bottom:42px; left:148px; transform:rotate(0deg) scale(1); opacity:1; }
  }

  .mon-body {
    width:80px; height:54px; background:#001a33;
    border:4px solid #3a3a3a; border-radius:3px;
    overflow:hidden; position:relative;
    animation:mon-screen 6s steps(1) infinite;
  }
  @keyframes mon-screen {
    0%,37%  { background:#001a33; border-color:#3a3a3a; }
    38%     { background:#003300; border-color:#55ff55; }
    39%,45% { background:#001a33; border-color:#3a3a3a; }
    46%     { background:#2a0000; border-color:#ff5555; }
    47%,53% { background:#000d1a; border-color:#333; }
    54%     { background:#1a0800; border-color:#888; }
    56%,100%{ background:#000000; border-color:#1a1a1a; }
  }
  .mon-stand { width:16px; height:8px; background:#444; margin:0 auto; }
  .mon-base  { width:34px; height:5px; background:#333; margin:0 auto; border-radius:2px; }

  .screen-lines { animation:screen-hide 6s steps(1) infinite; }
  @keyframes screen-hide { 0%,54%{opacity:1} 55%,100%{opacity:0} }

  .code-line { height:4px; margin:2px 3px; border-radius:1px; }
  .cl1{background:#00ff41;width:60%} .cl2{background:#ff6600;width:75%}
  .cl3{background:#00ff41;width:40%} .cl4{background:#ff0000;width:85%}
  .cl5{background:#00ff41;width:50%} .cl6{background:#ff6600;width:30%}
  .cl4{animation:err-blink 0.25s steps(1) infinite}
  @keyframes err-blink{0%,49%{opacity:1}50%,100%{opacity:0}}

  .screen-dead {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:22px; color:#1a0000; font-family:monospace;
    opacity:0; animation:dead-show 6s steps(1) infinite;
  }
  @keyframes dead-show { 0%,54%{opacity:0} 55%,78%{opacity:1} 79%,100%{opacity:0} }

  .screen-crack {
    position:absolute; inset:0; pointer-events:none;
    opacity:0; animation:crack-show 6s steps(1) infinite;
  }
  @keyframes crack-show { 0%,45%{opacity:0} 46%,78%{opacity:1} 79%,100%{opacity:0} }

  /* ===== DEV ===== */
  .dev {
    position:absolute; bottom:40px; z-index:8;
    animation:dev-pos 6s steps(1) infinite;
  }
  @keyframes dev-pos {
    0%,28%  { left:195px; bottom:40px; }
    32%     { left:183px; bottom:40px; }
    35%,100%{ left:168px; bottom:50px; }
  }

  .head {
    width:22px; height:22px; background:#f5c87a; border-radius:3px;
    margin:0 auto; position:relative;
    animation:head-shake 6s steps(1) infinite;
  }
  @keyframes head-shake {
    0%,31%  { transform:rotate(0deg); }
    35%     { transform:rotate(8deg); }
    38%     { transform:rotate(-10deg); }
    43%     { transform:rotate(12deg); }
    46%     { transform:rotate(-12deg); }
    50%     { transform:rotate(15deg); }
    54%     { transform:rotate(-15deg); }
    56%,100%{ transform:rotate(-6deg); }
  }

  .hair { position:absolute; top:-4px; left:-1px; width:24px; height:8px; background:#2c1a00; border-radius:3px 3px 0 0; }

  .eye-l,.eye-r {
    position:absolute; top:8px; width:4px; height:4px;
    background:#222; border-radius:1px;
    animation:eyes 6s steps(1) infinite;
  }
  .eye-l{left:4px} .eye-r{right:4px}
  @keyframes eyes { 0%,29%{background:#222;height:4px} 30%{background:#aa0000;height:3px} 34%,100%{background:#ff0000;height:4px} }

  .brow-l,.brow-r { position:absolute; top:4px; width:7px; height:2px; background:#5a3000; animation:brows 6s steps(1) infinite; }
  .brow-l{left:2px;transform:rotate(18deg)} .brow-r{right:2px;transform:rotate(-18deg)}
  @keyframes brows { 0%,29%{opacity:0} 30%,100%{opacity:1} }

  .mouth {
    position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
    width:10px; height:2px; background:#c0392b; border-radius:0 0 3px 3px;
    animation:mouth-anim 6s steps(1) infinite;
  }
  @keyframes mouth-anim {
    0%,29%  { height:2px; border-radius:0 0 3px 3px; }
    30%,100%{ height:5px; border-radius:3px 3px 0 0; }
  }

  .sweat {
    position:absolute; top:5px; right:-7px; width:4px; height:6px;
    background:#4af; border-radius:50% 50% 50% 0; transform:rotate(-30deg);
    animation:sweat-anim 6s steps(1) infinite;
  }
  @keyframes sweat-anim { 0%,18%{opacity:0} 19%,28%{opacity:1} 29%,100%{opacity:0} }

  .steam-l,.steam-r {
    position:absolute; top:-8px; width:4px; height:9px;
    background:#ff5500; border-radius:2px 2px 0 0; opacity:0;
    animation:steam-anim 6s steps(1) infinite;
  }
  .steam-l{left:3px} .steam-r{right:3px}
  @keyframes steam-anim { 0%,30%{opacity:0} 31%{opacity:1} 33%{opacity:0.4} 35%,100%{opacity:0} }

  .body {
    width:26px; height:24px; margin:0 auto;
    border-radius:2px; position:relative;
    animation:body-anim 6s steps(1) infinite;
  }
  @keyframes body-anim {
    0%,29%  { height:18px; margin-top:2px; background:#2244cc; }
    30%,100%{ height:24px; margin-top:0;   background:#c0392b; }
  }

  .arm-l,.arm-r {
    position:absolute; top:2px; width:7px; height:18px;
    background:inherit; border-radius:2px; transform-origin:top center;
  }
  .arm-l{left:-8px; animation:arm-l 6s steps(1) infinite;}
  .arm-r{right:-8px; animation:arm-r 6s steps(1) infinite;}

  @keyframes arm-l {
    0%,29%  { transform:rotate(15deg);  background:#2244cc; }
    33%     { transform:rotate(-30deg); background:#c0392b; }
    /* LIFT arms up high */
    36%     { transform:rotate(-95deg); background:#c0392b; }
    /* SLAM 1 down */
    38%     { transform:rotate(-55deg); background:#c0392b; }
    /* re-raise */
    42%     { transform:rotate(-95deg); background:#c0392b; }
    /* SLAM 2 */
    46%     { transform:rotate(-50deg); background:#c0392b; }
    /* re-raise */
    49%     { transform:rotate(-95deg); background:#c0392b; }
    /* SLAM 3 */
    54%     { transform:rotate(-45deg); background:#c0392b; }
    55%,100%{ transform:rotate(-35deg); background:#c0392b; }
  }
  @keyframes arm-r {
    0%,29%  { transform:rotate(-15deg); background:#2244cc; }
    33%     { transform:rotate(30deg);  background:#c0392b; }
    36%     { transform:rotate(95deg);  background:#c0392b; }
    38%     { transform:rotate(55deg);  background:#c0392b; }
    42%     { transform:rotate(95deg);  background:#c0392b; }
    46%     { transform:rotate(50deg);  background:#c0392b; }
    49%     { transform:rotate(95deg);  background:#c0392b; }
    54%     { transform:rotate(45deg);  background:#c0392b; }
    55%,100%{ transform:rotate(35deg);  background:#c0392b; }
  }

  .legs { display:flex; justify-content:center; gap:5px; margin-top:1px; }
  .leg-l,.leg-r { width:10px; background:#1a1a4a; border-radius:0 0 2px 2px; animation:legs-anim 6s steps(1) infinite; }
  @keyframes legs-anim { 0%,29%{height:14px} 30%,100%{height:22px} }

  /* ===== SPARKS ===== */
  .sparks-wrap {
    position:absolute; bottom:36px; left:118px;
    width:80px; height:55px;
    pointer-events:none; z-index:15;
  }
  .burst { position:absolute; inset:0; opacity:0; }

  .burst1 { animation:b1 6s steps(1) infinite; }
  @keyframes b1 { 0%,37.9%{opacity:0} 38%{opacity:1} 38.8%{opacity:0.5} 39%{opacity:0} 100%{opacity:0} }

  .burst2 { animation:b2 6s steps(1) infinite; }
  @keyframes b2 { 0%,45.9%{opacity:0} 46%{opacity:1} 46.8%{opacity:0.6} 47%{opacity:0} 100%{opacity:0} }

  .burst3 { animation:b3 6s steps(1) infinite; }
  @keyframes b3 { 0%,53.9%{opacity:0} 54%{opacity:1} 54.5%{opacity:0.8} 55%{opacity:0.4} 55.5%{opacity:0} 100%{opacity:0} }

  .sp { position:absolute; border-radius:50%; }

  .burst1 .sp:nth-child(1){width:5px;height:5px;background:#ff0;top:12px;left:35px}
  .burst1 .sp:nth-child(2){width:4px;height:4px;background:#f80;top:5px;left:18px}
  .burst1 .sp:nth-child(3){width:3px;height:3px;background:#ff0;top:5px;left:52px}
  .burst1 .sp:nth-child(4){width:4px;height:4px;background:#f40;top:20px;left:10px}
  .burst1 .sp:nth-child(5){width:3px;height:3px;background:#ff0;top:20px;left:58px}
  .burst1 .sp:nth-child(6){width:3px;height:3px;background:#fff;top:2px;left:37px}

  .burst2 .sp:nth-child(1){width:7px;height:7px;background:#ff0;top:10px;left:32px}
  .burst2 .sp:nth-child(2){width:5px;height:5px;background:#f80;top:3px;left:14px}
  .burst2 .sp:nth-child(3){width:4px;height:4px;background:#f40;top:3px;left:52px}
  .burst2 .sp:nth-child(4){width:5px;height:5px;background:#ff0;top:22px;left:6px}
  .burst2 .sp:nth-child(5){width:4px;height:4px;background:#fff;top:22px;left:62px}
  .burst2 .sp:nth-child(6){width:4px;height:4px;background:#f00;top:0px;left:34px}
  .burst2 .sp:nth-child(7){width:3px;height:3px;background:#ff0;top:28px;left:36px}
  .burst2 .sp:nth-child(8){width:4px;height:4px;background:#f80;top:15px;left:68px}

  .burst3 .sp:nth-child(1){width:9px;height:9px;background:#ff0;top:8px;left:28px}
  .burst3 .sp:nth-child(2){width:6px;height:6px;background:#f80;top:1px;left:10px}
  .burst3 .sp:nth-child(3){width:5px;height:5px;background:#f40;top:1px;left:54px}
  .burst3 .sp:nth-child(4){width:7px;height:7px;background:#ff0;top:20px;left:2px}
  .burst3 .sp:nth-child(5){width:5px;height:5px;background:#fff;top:20px;left:66px}
  .burst3 .sp:nth-child(6){width:4px;height:4px;background:#f00;top:30px;left:16px}
  .burst3 .sp:nth-child(7){width:4px;height:4px;background:#ff0;top:30px;left:52px}
  .burst3 .sp:nth-child(8){width:3px;height:3px;background:#fff;top:35px;left:36px}
  .burst3 .sp:nth-child(9){width:8px;height:8px;background:#f80;top:12px;left:40px}
  .burst3 .sp:nth-child(10){width:5px;height:5px;background:#ff0;top:0px;left:36px}

  /* ===== FLASH ===== */
  .flash {
    position:absolute; inset:0; pointer-events:none; z-index:20; opacity:0;
    animation:flash 6s steps(1) infinite;
  }
  @keyframes flash {
    0%,37.9%{opacity:0} 38%{opacity:0.45} 38.6%{opacity:0}
    45.9%{opacity:0}    46%{opacity:0.55} 46.6%{opacity:0}
    53.9%{opacity:0}    54%{opacity:0.75} 54.4%{opacity:0.35} 54.8%{opacity:0}
    100%{opacity:0}
  }

  /* ===== CAPTION ===== */
  .caption {
    position:absolute; bottom:5px; left:0; right:0;
    text-align:center; font-size:5px;
    animation:cap-col 6s steps(1) infinite;
  }
  @keyframes cap-col {
    0%,29%{color:#3a6a3a} 30%,58%{color:#ff4400} 59%,78%{color:#883300} 79%,100%{color:#3a6a3a}
  }

  .loop-label { color:#333; font-size:7px; margin-top:14px; letter-spacing:1px; }
</style>
</head>
<body>

<h1>⚠ DEVELOPER.EXE ⚠</h1>

<div class="scene-wrap">
<div class="scene">
  <div class="bg"></div>

  <div class="wall-note">
    <div style="color:#1a5c1a">git push</div>
    <div style="color:#5c1a1a">REJECTED</div>
    <div style="color:#3a3a3a">errno:403</div>
  </div>
  <div class="wall-led"></div>

  <div class="room"></div>
  <div class="floor"></div>

  <div class="desk"></div>
  <div class="desk-crack">
    <svg viewBox="0 0 30 22" xmlns="http://www.w3.org/2000/svg">
      <polyline points="15,0 11,9 17,11 9,22"  stroke="#1a0a00" stroke-width="1.5" fill="none"/>
      <polyline points="15,0 19,7 14,10 21,20" stroke="#1a0a00" stroke-width="1"   fill="none"/>
    </svg>
  </div>

  <div class="chair">
    <div class="chair-back"></div>
    <div class="chair-seat"></div>
    <div class="chair-leg1"></div>
    <div class="chair-leg2"></div>
  </div>

  <!-- Monitor -->
  <div class="monitor">
    <div class="mon-body">
      <div class="screen-lines">
        <div class="code-line cl1"></div>
        <div class="code-line cl2"></div>
        <div class="code-line cl3"></div>
        <div class="code-line cl4"></div>
        <div class="code-line cl5"></div>
        <div class="code-line cl6"></div>
      </div>
      <div class="screen-dead">✕</div>
      <div class="screen-crack">
        <svg viewBox="0 0 80 54" xmlns="http://www.w3.org/2000/svg" width="80" height="54">
          <polyline points="40,0 33,18 44,23 26,54"  stroke="#0d0d0d" stroke-width="1.5" fill="none"/>
          <polyline points="40,0 47,15 38,21 53,40 45,54" stroke="#080808" stroke-width="1" fill="none"/>
          <polyline points="56,10 48,23 57,29" stroke="#0d0d0d" stroke-width="0.8" fill="none"/>
        </svg>
      </div>
    </div>
    <div class="mon-stand"></div>
    <div class="mon-base"></div>
  </div>

  <!-- Developer -->
  <div class="dev">
    <div class="head">
      <div class="hair"></div>
      <div class="eye-l"></div>
      <div class="eye-r"></div>
      <div class="brow-l"></div>
      <div class="brow-r"></div>
      <div class="mouth"></div>
      <div class="sweat"></div>
      <div class="steam-l"></div>
      <div class="steam-r"></div>
    </div>
    <div class="body">
      <div class="arm-l"></div>
      <div class="arm-r"></div>
    </div>
    <div class="legs">
      <div class="leg-l"></div>
      <div class="leg-r"></div>
    </div>
  </div>

  <!-- Sparks -->
  <div class="sparks-wrap">
    <div class="burst burst1">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
    </div>
    <div class="burst burst2">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div>
    </div>
    <div class="burst burst3">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div>
    </div>
  </div>

  <div class="flash"></div>

  <div class="caption">// git blame yourself</div>
